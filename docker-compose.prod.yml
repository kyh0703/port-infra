services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api-migrate:
    build:
      context: ./dubu-api
      dockerfile: Dockerfile
      target: migrator
    image: dubu-api-migrator:local
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/dubu.sqlite
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/app/data
    restart: "no"

  api:
    build:
      context: ./dubu-api
      dockerfile: Dockerfile
    image: dubu-api:local
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-3001}:3001"
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/dubu.sqlite
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/app/data

  web:
    build:
      context: ./dubu-web
      dockerfile: Dockerfile
    image: dubu-web:local
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}

volumes:
  redis_data:
