services:
  postgres:
    image: postgres:17-alpine
    profiles: ["infra", "app"]
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-port}
      POSTGRES_USER: ${POSTGRES_USER:-port}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-port_local_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:9
    profiles: ["infra"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7-alpine
    profiles: ["infra", "app"]
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./port-api
      dockerfile: Dockerfile
      target: deps
    profiles: ["app"]
    image: port-api:local
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    env_file: ./.env
    environment:
      NODE_ENV: local
      NODE_ID: ${NODE_ID:-1}
      PORT: 3001
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DATABASE_URL: ${DATABASE_URL:-postgresql://port:port_local_password@postgres:5432/port}
      DB_PATH: /app/data/overthinker.sqlite
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_TOKEN_SECRET: ${JWT_ACCESS_TOKEN_SECRET:-overthinker_local_access_token_secret_change_me}
      JWT_ACCESS_TOKEN_EXPIRES_IN: ${JWT_ACCESS_TOKEN_EXPIRES_IN:-15m}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET:-overthinker_local_refresh_token_secret_change_me}
      JWT_REFRESH_TOKEN_EXPIRES_IN: ${JWT_REFRESH_TOKEN_EXPIRES_IN:-7d}
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-25}
      EMAIL_ADDRESS: ${EMAIL_ADDRESS:-your-email@example.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-your-email-app-password}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
    volumes:
      - ./port-api:/app
      - port_api_node_modules:/app/node_modules
      - port_api_data:/app/data
    command: >
      sh -lc "CI=true pnpm install --frozen-lockfile &&
      pnpm mikro-orm:local migration:up &&
      pnpm dev:local"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 20

  media:
    build:
      context: ./port-media
      dockerfile: build/package/Dockerfile
    profiles: ["app"]
    image: port-media:local
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${MEDIA_PORT:-8080}:8080"
    env_file: ./.env
    environment:
      APP_PROFILE: dev
      NODE_ID: ${MEDIA_NODE_ID:-2}
      SERVER_PORT: 8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-replace-with-openai-api-key}
      DATABASE_DSN: "file:/app/data/portfolio_media.db?cache=shared"
      REDIS_ADDR: redis:6379
      MEDIA_SERVER_URL: ${MEDIA_SERVER_PUBLIC_URL:-http://localhost:8080}
      EVENTS_CONVERSATION_STREAM_NAME: ${EVENTS_CONVERSATION_STREAM_NAME:-media:conversation-events:v1}
    volumes:
      - port_media_data:/app/data

  web:
    build:
      context: ./port-web
      dockerfile: Dockerfile
      target: deps
    profiles: ["app"]
    image: port-web:local
    working_dir: /app
    depends_on:
      - api
      - media
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file: ./.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_REALTIME_ICE_SERVERS: ${NEXT_PUBLIC_REALTIME_ICE_SERVERS:-}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET:-overthinker_local_refresh_token_secret_change_me}
    volumes:
      - ./port-web:/app
      - port_web_node_modules:/app/node_modules
      - port_web_next:/app/.next
    command: >
      sh -lc "CI=true pnpm install --frozen-lockfile &&
      pnpm dev --hostname 0.0.0.0"

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  port_api_node_modules:
  port_api_data:
  port_media_data:
  port_web_node_modules:
  port_web_next:
