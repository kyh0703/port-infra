services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./dubu-api
      dockerfile: Dockerfile
      target: deps
    image: dubu-exec-api:local
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    env_file: ./.env
    volumes:
      - ./dubu-api:/app
      - api_node_modules:/app/node_modules
      - ./data:/app/data
    command: >
      sh -lc "CI=true pnpm install --frozen-lockfile &&
      pnpm mikro-orm:local migration:up &&
      pnpm dev:local"

  web:
    build:
      context: ./dubu-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
    image: dubu-web:local
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}

volumes:
  redis_data:
  api_node_modules:
