services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: dubu-exec-api:local
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    env_file: ./.env
    volumes:
      - ./dubu-api:/app
      - api_node_modules:/app/node_modules
      - api_data:/app/data
    command: >
      sh -lc "pnpm install --frozen-lockfile &&
      pnpm mikro-orm:local migration:up &&
      pnpm dev:local"

  web:
    image: node:24-bookworm-slim
    working_dir: /app
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
    volumes:
      - ./dubu-web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.26.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm dev --hostname 0.0.0.0"

volumes:
  redis_data:
  api_node_modules:
  api_data:
  web_node_modules:
  web_next:
